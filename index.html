    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; min-height: 100vh; }
    header { background: linear-gradient(135deg, #4a7fd4 0%, #2a5aaa 100%); color: white; padding: 2rem 1rem 1.5rem; text-align: center; }
    .header-row { display: flex; align-items: center; justify-content: center; gap: 0.6rem; flex-wrap: wrap; }
    .logo { font-family: 'Lobster', cursive; font-size: clamp(2rem, 5vw, 3rem); color: #3ab89a; line-height: 1; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .divider { color: rgba(255,255,255,0.5); font-size: 1.4rem; }
    .site-title { font-family: 'Oswald', sans-serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 600; color: #3ab89a; letter-spacing: 0.08em; line-height: 1; }
    .subtitle { margin: 0.6rem 0 0; font-size: 1rem; opacity: 0.85; }
    .credit { margin: 0.25rem 0 0; font-size: 0.9rem; color: #3ab89a; }
    .controls { max-width: 900px; margin: 1.5rem auto 0; padding: 0 1rem; }
    .search-input { width: 100%; padding: 0.75rem 1rem; font-size: 1rem; border: 2px solid #dde2ec; border-radius: 10px; outline: none; margin-bottom: 1rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab { padding: 0.5rem 1.1rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; background: #e4e8f0; color: #444; transition: all 0.15s; font-family: inherit; }
    .tab.active-all { background: #4a7fd4; color: white; }
    .tab.active-hospitals { background: #4a7fd4; color: white; }
    .tab.active-rescues { background: #3ab89a; color: white; }
    .count { color: #666; font-size: 0.88rem; margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; padding-bottom: 2rem; }
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #eaecf0; display: flex; flex-direction: column; }
    .card-bar { height: 6px; }
    .card-body { padding: 1rem; flex-grow: 1; display: flex; flex-direction: column; }
    .badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 0.5rem; align-self: flex-start; }
    .card-name { margin: 0 0 0.2rem; font-size: 1rem; font-weight: 700; color: #1a202c; line-height: 1.3; }
    .card-location { margin: 0 0 0.9rem; font-size: 0.85rem; color: #718096; }
    .wish-btn { display: block; text-align: center; color: white; padding: 0.55rem 0.75rem; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.88rem; margin-top: auto; }
    footer { background: #1a202c; color: white; text-align: center; padding: 1.5rem 1rem; font-size: 0.85rem; }
    footer p { margin: 0 0 0.25rem; opacity: 0.8; }
    footer a { color: #90cdf4; text-decoration: none; }
    .footer-title { font-weight: 600; font-size: 0.95rem; opacity: 1 !important; }
  </style>

      { id:2061, name:"Windham County Humane Society (WCHS)", city:"Brattleboro", state:"VT", type:"rescue", wishlistUrl:"https://www.amazon.com/hz/wishlist/ls/28FBNRLZBQAQI" },
      { id:2062, name:"Springfield Humane Society", city:"Springfield", state:"VT", type:"rescue", wishlistUrl:"https://www.amazon.com/gp/registry/wishlist/3REG58CSH27NA" },
      { id:2063, name:"Animal Welfare League of Alexandria (AWLA)", city:"Alexandria", state:"VA", type:"rescue", wishlistUrl:"https://www.amazon.com/hz/wishlist/ls/7EOGGJP73RPI" },
      { id:2064, name:"Seattle Humane Society", city:"Seattle", state:"WA", type:"rescue", wishlistUrl:"https://www.amazon.com/hz/wishlist/ls/33H86MPZAODAW" },
      { id:2065, name:"Wisconsin Humane Society", city:"Milwaukee", state:"WI", type:"rescue", wishlistUrl:"https://www.amazon.com/hz/wishlist/ls/2WK81GAE5RTKQ" },
    ];

    const HOSPITAL_COLOR = "#4a7fd4";
    const RESCUE_COLOR = "#3ab89a";

    function App() {
      const [search, setSearch] = React.useState("");
      const [activeTab, setActiveTab] = React.useState("all");
      const filtered = organizations.filter(org => {
        const matchesTab = activeTab === "all" || (activeTab === "hospitals" && org.type === "hospital") || (activeTab === "rescues" && org.type === "rescue");
        const q = search.toLowerCase();
        const matchesSearch = !q || org.name.toLowerCase().includes(q) || org.city.toLowerCase().includes(q) || org.state.toLowerCase().includes(q);
        return matchesTab && matchesSearch;
      }).sort((a, b) => {
        if (a.type !== b.type) return a.type === "hospital" ? -1 : 1;
        if (a.state < b.state) return -1;
        if (a.state > b.state) return 1;
        if (a.name < b.name) return -1;
        if (a.name > b.name) return 1;
        return 0;
      });
      return (
        <div>
          <header>
            <div className="header-row">
              <span className="logo">Bored No More</span>
              <span className="divider">✦</span>
              <span className="site-title">Charity WishLink</span>
            </div>
            <p className="subtitle">Shop Amazon wishlists for children's hospitals &amp; animal rescues across the U.S.</p>
            <p className="credit">Created by Taylor Brady</p>
          </header>
          <div className="controls">
            <input className="search-input" type="text" placeholder="Search by name, city, or state…" value={search} onChange={e => setSearch(e.target.value)} />
            <div className="tabs">
              {[{key:"all",label:"All"},{key:"hospitals",label:"🏥 Children's Hospitals"},{key:"rescues",label:"🐾 Animal Rescues"}].map(tab => (
                <button key={tab.key} className={`tab ${activeTab === tab.key ? "active-" + tab.key : ""}`} onClick={() => setActiveTab(tab.key)}>{tab.label}</button>
              ))}
            </div>
            <p className="count">Showing {filtered.length} organization{filtered.length !== 1 ? "s" : ""}</p>
            <div className="grid">
              {filtered.map(org => {
                const accent = org.type === "hospital" ? HOSPITAL_COLOR : RESCUE_COLOR;
                return (
                  <div className="card" key={org.id}>
                    <div className="card-bar" style={{background: accent}}></div>
                    <div className="card-body">
                      <span className="badge" style={{background: accent + "18", color: accent}}>{org.type === "hospital" ? "🏥 Children's Hospital" : "🐾 Animal Rescue"}</span>
                      <h3 className="card-name">{org.name}</h3>
                      <p className="card-location">📍 {org.city}, {org.state}</p>
                      <a href={org.wishlistUrl} target="_blank" rel="noopener noreferrer" className="wish-btn" style={{background: accent}}>🛒 View Wish List</a>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <footer>
            <p className="footer-title">Bored No More Charity WishLink</p>
            <p><a href="https://www.borednomorecharity.org" target="_blank" rel="noopener noreferrer">www.borednomorecharity.org</a></p>
            <p><a href="mailto:borednomore01@gmail.com">borednomore01@gmail.com</a></p>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  
</body>
</html>
